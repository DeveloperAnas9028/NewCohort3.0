<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>

<body>

    <h2 class="heading1">Hi! This is COHORT 3.0 </h2>

    <h2 class="heading2">Student Registration Form</h2>

    <form action="">
        <fieldset class="field">
            <legend class="legnd">Personal Information</legend><br>

            Name: <input type="text" placeholder="Enter your name"><br><br>
            Email: <input type="email" placeholder="Enter your email"><br><br>
            Mobile: <input type="number" placeholder="Enter your mobile"><br><br>

        </fieldset>
<br><br>
        <fieldset class="field">
            <legend class="legnd">Address Info</legend><br>
            
            Enter Address: <textarea cols="30" rows="10" placeholder="Your Address here "></textarea>

            <br><br>

            Select City:
            <select>
                <option>City</option>
                <option>Pune</option>
                <option>Jalgaon</option>
                <option>Bangalore</option>
                <option>Mumbai</option>
                <option>Dhule</option>
                <option>Mumbra</option>
            </select>

        </fieldset>
        <br>

        Select Courses:
        <select>
            <optgroup label="Frontend">
                <option>HTML</option>
                <option>CSS</option>
                <option>JS</option>
            </optgroup>

            <optgroup label="Backend">
                <option>Node JS</option>
                <option>Express JS</option>
                <option>Mongo DB</option>
            </optgroup>
        </select>

        <br><br>
        <button>Submit</button>
    </form>
</body>

</html>
